<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEAPOD | Dashboard Pengering Rumput Laut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-5px); border-color: #38bdf8; box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.3); }
        .stat-icon { background: linear-gradient(45deg, #0ea5e9, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">SEAPOD <span class="text-sky-400">Dryer</span></h1>
                <p class="text-slate-400">Sistem Monitoring Pengeringan Rumput Laut Cerdas</p>
            </div>
            <div class="flex items-center gap-4 bg-slate-800/50 p-3 rounded-2xl border border-slate-700">
                <div class="h-3 w-3 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-sm font-medium">Status: Online </span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="glass-card p-6">
                <div class="flex justify-between items-start mb-4">
                    <i class="fa-solid fa-temperature-half text-3xl stat-icon"></i>
                    <span class="text-xs font-bold text-sky-400 uppercase tracking-wider">Sensor</span>
                </div>
                <h3 class="text-slate-400 text-sm mb-1">Suhu Ruangan</h3>
                <p class="text-5xl font-bold text-white"><span id="suhu">--</span> <span class="text-2xl font-normal text-slate-300">°C</span></p>
            </div>

            <div class="glass-card p-6">
                <div class="flex justify-between items-start mb-4">
                    <i class="fa-solid fa-droplet text-3xl stat-icon"></i>
                    <span class="text-xs font-bold text-sky-400 uppercase tracking-wider">Sensor</span>
                </div>
                <h3 class="text-slate-400 text-sm mb-1">Kelembapan Ruangan</h3>
                <p class="text-5xl font-bold text-white"><span id="kelembapan">--</span> <span class="text-2xl font-normal text-slate-300">%</span></p>
            </div>

            <div class="glass-card p-6">
                <div class="flex justify-between items-start mb-4">
                    <i class="fa-solid fa-weight-hanging text-3xl stat-icon"></i>
                    <span class="text-xs font-bold text-sky-400 uppercase tracking-wider">Load Cell</span>
                </div>
                <h3 class="text-slate-400 text-sm mb-1">Berat Aktual</h3>
                <p class="text-5xl font-bold text-white"><span id="berat">--</span> <span class="text-2xl font-normal text-slate-300">Kg</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div class="glass-card p-8 border-l-4 border-l-cyan-400">
                <div class="flex justify-between items-start mb-4">
                    <i class="fa-solid fa-chart-pie text-4xl stat-icon"></i>
                </div>
                <h3 class="text-slate-400 text-sm mb-1">Penyusutan Total</h3>
                <p class="text-5xl font-bold text-white"><span id="penyusutan">--</span> <span class="text-2xl font-normal text-slate-300">%</span></p>
                <p class="text-xs text-slate-500 mt-3 font-medium">Berdasarkan kalkulasi selisih berat awal dan aktual</p>
            </div>
        </div>
    </div>

    <script>
        // Simulasi Data untuk UI Mockup
        function perbaruiDashboard() {
            // Simulasi nilai yang akan datang dari ESP32 / Firebase
            const data = {
                suhuRuangan: 45.5,
                kelembapanRuangan: 30.2,
                beratAktual: 1.8,
                
                // Variabel untuk perhitungan penyusutan
                beratAwal: 10.0 // Contoh berat awal rumput laut
            };

            // Menghitung Penyusutan Total secara dinamis di Frontend
            // Rumus: ((Berat Awal - Berat Aktual) / Berat Awal) * 100
            let penyusutanTotal = ((data.beratAwal - data.beratAktual) / data.beratAwal) * 100;

            // Menampilkan data ke elemen HTML
            document.getElementById('suhu').innerText = data.suhuRuangan.toFixed(1);
            document.getElementById('kelembapan').innerText = data.kelembapanRuangan.toFixed(1);
            document.getElementById('berat').innerText = data.beratAktual.toFixed(2);
            
            // Menampilkan penyusutan dengan 1 angka di belakang koma
            document.getElementById('penyusutan').innerText = penyusutanTotal.toFixed(1);
        }

        // Jalankan fungsi saat halaman dimuat
        window.onload = perbaruiDashboard;
    </script>
</body>
</html>
